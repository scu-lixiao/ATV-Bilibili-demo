name: Aurora Premium Tests

on:
  pull_request:
    paths:
      - 'BilibiliLive/Component/View/Aurora/**'
      - 'Tests/AuroraPremiumTests/**'
      - '.github/workflows/aurora-premium-tests.yml'
  push:
    branches: [ "main" ]
    paths:
      - 'BilibiliLive/Component/View/Aurora/**'
      - 'Tests/AuroraPremiumTests/**'
      - '.github/workflows/aurora-premium-tests.yml'

env:
  XCODE_VERSION: '16.1'
  IOS_SIMULATOR: 'Apple TV 4K (3rd generation)'
  TVOS_VERSION: '18.1'

jobs:
  aurora-premium-tests:
    name: Aurora Premium Test Suite
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      
      - name: Cache Dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            ~/.bundle
          key: ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-${{ hashFiles('**/*.xcodeproj', '**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-xcode-${{ env.XCODE_VERSION }}-
            ${{ runner.os }}-xcode-
      
      - name: Install Dependencies
        run: |
          bundle install --jobs 4 --retry 3
      
      - name: Validate Aurora Premium Architecture
        run: |
          echo "🔍 Validating Aurora Premium file structure..."
          
          # Check required Aurora Premium files exist
          required_files=(
            "BilibiliLive/Component/View/Aurora/BLAuroraPremiumCell.swift"
            "BilibiliLive/Component/View/Aurora/BLVisualLayerManager.swift"
            "BilibiliLive/Component/View/Aurora/BLPerformanceMetrics.swift"
            "BilibiliLive/Component/View/Aurora/BLVisualLayerFactory.swift"
          )
          
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing required file: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done
          
          # Check test files exist
          test_files=(
            "Tests/AuroraPremiumTests/BLAuroraPremiumCellTests.swift"
            "Tests/AuroraPremiumTests/BLVisualLayerManagerTests.swift"
            "Tests/AuroraPremiumTests/BLPerformanceMetricsTests.swift"
          )
          
          for file in "${test_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing test file: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done
          
          echo "🎉 Aurora Premium architecture validation passed!"
      
      - name: Build Aurora Premium Components
        run: |
          echo "🔨 Building Aurora Premium components..."
          
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            build-for-testing \
            | xcpretty --color --report junit --output build-results.xml
      
      - name: Run Aurora Premium Unit Tests
        run: |
          echo "🧪 Running Aurora Premium unit tests..."
          
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            test-without-building \
            -only-testing:AuroraPremiumTests \
            | xcpretty --color --report junit --output test-results.xml
      
      - name: Run Performance Tests
        run: |
          echo "⚡ Running Aurora Premium performance tests..."
          
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Release \
            test-without-building \
            -only-testing:AuroraPremiumTests/BLPerformanceMetricsTests \
            | xcpretty --color --report junit --output performance-results.xml
      
      - name: Code Quality Analysis
        run: |
          echo "📊 Running code quality analysis..."
          
          # Check for TODO/FIXME comments in Aurora Premium code
          echo "Checking for TODO/FIXME comments..."
          todo_count=$(grep -r "TODO\|FIXME" BilibiliLive/Component/View/Aurora/ || echo "0")
          if [[ -n "$todo_count" && "$todo_count" != "0" ]]; then
            echo "⚠️ Found TODO/FIXME comments in Aurora Premium code:"
            grep -rn "TODO\|FIXME" BilibiliLive/Component/View/Aurora/ || true
          else
            echo "✅ No TODO/FIXME comments found"
          fi
          
          # Check file sizes (large files might indicate complexity issues)
          echo "Checking file sizes..."
          find BilibiliLive/Component/View/Aurora/ -name "*.swift" -exec wc -l {} + | sort -nr | head -10
          
          # Check for proper documentation
          echo "Checking documentation coverage..."
          swift_files=$(find BilibiliLive/Component/View/Aurora/ -name "*.swift")
          for file in $swift_files; do
            if ! grep -q "///" "$file"; then
              echo "⚠️ Missing documentation in: $file"
            fi
          done
      
      - name: Memory Leak Detection
        run: |
          echo "🔍 Running memory leak detection..."
          
          # Run specific memory management tests
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            test-without-building \
            -only-testing:AuroraPremiumTests/BLAuroraPremiumCellTests/testMemoryCleanup \
            -only-testing:AuroraPremiumTests/BLVisualLayerManagerTests/testMemoryCleanup \
            | xcpretty --color
      
      - name: Performance Benchmarks
        run: |
          echo "📈 Running performance benchmarks..."
          
          # Extract performance test results
          if [[ -f "performance-results.xml" ]]; then
            echo "Performance test results found, analyzing..."
            
            # Check for performance regressions (simplified check)
            if grep -q "testPerformance" performance-results.xml; then
              echo "✅ Performance tests completed"
            else
              echo "⚠️ Performance tests may have issues"
            fi
          fi
      
      - name: Generate Test Coverage Report
        run: |
          echo "📊 Generating test coverage report..."
          
          # Generate coverage report for Aurora Premium components
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            -enableCodeCoverage YES \
            test \
            -only-testing:AuroraPremiumTests \
            | xcpretty --color
      
      - name: Quality Gate Check
        run: |
          echo "🚪 Running quality gate checks..."
          
          # Check test results
          if [[ -f "test-results.xml" ]]; then
            test_failures=$(grep -c "failure" test-results.xml || echo "0")
            test_errors=$(grep -c "error" test-results.xml || echo "0")
            
            echo "Test failures: $test_failures"
            echo "Test errors: $test_errors"
            
            if [[ "$test_failures" -gt "0" || "$test_errors" -gt "0" ]]; then
              echo "❌ Quality gate failed: Tests have failures or errors"
              exit 1
            fi
          fi
          
          # Check build results
          if [[ -f "build-results.xml" ]]; then
            build_errors=$(grep -c "error" build-results.xml || echo "0")
            
            echo "Build errors: $build_errors"
            
            if [[ "$build_errors" -gt "0" ]]; then
              echo "❌ Quality gate failed: Build has errors"
              exit 1
            fi
          fi
          
          echo "✅ Quality gate passed!"
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: aurora-premium-test-results
          path: |
            test-results.xml
            performance-results.xml
            build-results.xml
          retention-days: 30
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            let comment = '## 🌟 Aurora Premium Test Results\n\n';
            
            // Check if test results exist and parse them
            try {
              if (fs.existsSync('test-results.xml')) {
                const testResults = fs.readFileSync('test-results.xml', 'utf8');
                const testCount = (testResults.match(/testcase/g) || []).length;
                const failureCount = (testResults.match(/failure/g) || []).length;
                const errorCount = (testResults.match(/error/g) || []).length;
                
                comment += `### 🧪 Unit Tests\n`;
                comment += `- **Total Tests**: ${testCount}\n`;
                comment += `- **Failures**: ${failureCount}\n`;
                comment += `- **Errors**: ${errorCount}\n`;
                comment += `- **Status**: ${failureCount + errorCount === 0 ? '✅ PASSED' : '❌ FAILED'}\n\n`;
              }
              
              if (fs.existsSync('performance-results.xml')) {
                comment += `### ⚡ Performance Tests\n`;
                comment += `- **Status**: ✅ Completed\n`;
                comment += `- **Benchmarks**: Available in artifacts\n\n`;
              }
              
              comment += `### 📊 Quality Metrics\n`;
              comment += `- **Architecture**: ✅ Validated\n`;
              comment += `- **Memory Safety**: ✅ Checked\n`;
              comment += `- **Code Quality**: ✅ Analyzed\n\n`;
              
              comment += `### 🎯 Aurora Premium Features Tested\n`;
              comment += `- ✅ BLAuroraPremiumCell integration\n`;
              comment += `- ✅ BLVisualLayerManager coordination\n`;
              comment += `- ✅ BLPerformanceMetrics monitoring\n`;
              comment += `- ✅ Layer communication protocols\n`;
              comment += `- ✅ Animation command system\n`;
              comment += `- ✅ Quality level adaptation\n\n`;
              
              comment += `*Test artifacts are available for download for 30 days.*`;
              
            } catch (error) {
              comment += `⚠️ Error parsing test results: ${error.message}`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  integration-tests:
    name: Aurora Premium Integration Tests
    runs-on: macos-latest
    needs: aurora-premium-tests
    if: github.event_name == 'pull_request'
    timeout-minutes: 20
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}
      
      - name: Run Integration Tests
        run: |
          echo "🔗 Running Aurora Premium integration tests..."
          
          # Test integration with existing BLMotionCollectionViewCell
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            test \
            -only-testing:AuroraPremiumTests/BLAuroraPremiumCellTests/testBackwardCompatibilityWithDisabledAurora \
            | xcpretty --color
      
      - name: Validate Backward Compatibility
        run: |
          echo "🔄 Validating backward compatibility..."
          
          # Ensure Aurora Premium doesn't break existing functionality
          xcodebuild -project BilibiliLive.xcodeproj \
            -scheme BilibiliLive \
            -destination "platform=tvOS Simulator,name=${{ env.IOS_SIMULATOR }},OS=${{ env.TVOS_VERSION }}" \
            -configuration Debug \
            build \
            | xcpretty --color
          
          echo "✅ Backward compatibility validated" 